openapi: 3.0.0
paths:
  /xam:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - App
  /xam/auth/admin/setup:
    post:
      description: >-
        Creates the single admin user in Firebase Auth and the database.
        Requires the `x-setup-key` header. Throws 409 if an admin already
        exists.
      operationId: AuthController_setup
      parameters:
        - name: x-setup-key
          required: true
          in: header
          description: Secret key from ADMIN_SETUP_SECRET_KEY env var
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSetupDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSetupResponseDto'
        '403':
          description: Invalid or missing setup key
        '409':
          description: Admin already exists
      summary: One-time admin account creation
      tags: &ref_0
        - Auth
  /xam/auth/admin/login:
    post:
      description: >-
        The client signs in with email/password via the Firebase JS SDK,
        retrieves the ID token via `getIdToken()`, and sends it here. On success
        a `admin_session` httpOnly cookie is set.
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponseDto'
        '401':
          description: Authentication failed
      summary: Admin login – exchange Firebase ID token for session cookie
      tags: *ref_0
  /xam/auth/admin/logout:
    post:
      description: >-
        Revokes all Firebase refresh tokens for the admin (invalidates all
        sessions across devices), then clears the browser cookie.
      operationId: AuthController_logout
      parameters: []
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: No active session
      security:
        - admin_session: []
      summary: Admin logout – revoke tokens and clear session cookie
      tags: *ref_0
  /xam/auth/admin/me:
    get:
      description: >-
        Returns the admin info for the current session. Used by the frontend to
        validate the session cookie.
      operationId: AuthController_me
      parameters: []
      responses:
        '200':
          description: Current admin info
        '401':
          description: No active session
      security:
        - admin_session: []
      summary: Get current session admin
      tags: *ref_0
  /xam/news/search:
    get:
      description: >-
        Fetches articles from the GDELT DOC 2.0 API (100+ languages, 200+
        countries).

        Supports filtering by keyword, country (FIPS code), domain, language,
        GKG theme,

        and a date range. Results are paginated in-memory from up to 250 GDELT
        records.


        **Note:** GDELT's rolling search window covers the last ~3 months.
      operationId: NewsController_searchNews
      parameters:
        - name: keyword
          required: true
          in: query
          description: Keywords to search for in article titles and content.
          schema:
            example: stock market india sensex
            type: string
        - name: countries
          required: false
          in: query
          description: Comma-separated FIPS country codes
          schema:
            example: IN,US
            type: array
            items:
              type: string
        - name: domains
          required: false
          in: query
          description: Comma-separated source domains
          schema:
            example: reuters.com,livemint.com
            type: array
            items:
              type: string
        - name: languages
          required: false
          in: query
          description: Comma-separated language names
          schema:
            example: English,Hindi
            type: array
            items:
              type: string
        - name: theme
          required: false
          in: query
          description: GKG theme filter
          schema:
            example: ECON_STOCKMARKET
            type: string
            enum:
              - ECON_STOCKMARKET
              - ECON_TRADE
              - ECON_CURRENCY
              - ECON_INFLATION
              - ECON_BANKRUPTCY
              - ECONOMY_HISTORIC
        - name: startDate
          required: false
          in: query
          description: ISO 8601 start date (GDELT 3-month window applies)
          schema:
            example: '2026-03-25'
            type: string
        - name: endDate
          required: false
          in: query
          description: ISO 8601 end date
          schema:
            example: '2026-03-30'
            type: string
        - name: sort
          required: false
          in: query
          description: Sort order
          schema:
            enum:
              - DateDesc
              - DateAsc
              - ToneDesc
              - ToneAsc
              - HybridRel
            type: string
        - name: page
          required: false
          in: query
          description: Page number (1-indexed)
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Articles per page (max 50)
          schema:
            minimum: 1
            maximum: 50
            default: 25
            example: 25
            type: number
      responses:
        '200':
          description: Paginated list of matched news articles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNewsResponseDto'
        '400':
          description: Invalid query parameters.
        '500':
          description: GDELT service unreachable.
      summary: Search global news via GDELT
      tags:
        - News
info:
  title: XAM-PROD BACKEND
  description: XAM-PROD Application Backend API
  version: 1.0.0
  contact:
    name: SUBHAM MAITY
    url: https://github.com/Subham-Maity
    email: maitysubham4041@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: subham-xam
    description: Developer of this app
servers:
  - url: http://localhost:3336
    description: Local server (development)
  - url: http://210.89.44.183:3336/xam
    description: Staging server (testing)
  - url: http://210.89.44.183:3336/xam
    description: Production server (live)
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    AdminSetupDto:
      type: object
      properties:
        email:
          type: string
          example: admin@portfolio.dev
        password:
          type: string
          minLength: 12
          description: Strong admin password (min 12 chars)
      required:
        - email
        - password
    AdminSetupResponseDto:
      type: object
      properties:
        message:
          type: string
          description: Setup successful message
          example: Admin account setup correctly
        admin:
          type: object
          description: Admin details
          example:
            id: cuid...
            email: admin@portfolio.dev
      required:
        - message
        - admin
    AdminLoginDto:
      type: object
      properties:
        email:
          type: string
          description: Admin email address
          example: admin@portfolio.dev
        idToken:
          type: string
          description: Firebase ID token from client-side signInWithEmailAndPassword
      required:
        - email
        - idToken
    AdminLoginResponseDto:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: Admin login successful
        admin:
          type: object
          description: Admin details
          example:
            id: cuid...
            email: admin@portfolio.dev
      required:
        - message
        - admin
    NewsArticleResponseDto:
      type: object
      properties:
        url:
          type: string
          description: Full article URL.
          example: https://reuters.com/...
        urlMobile:
          type: string
          description: Mobile article URL (may be empty).
          example: ''
        title:
          type: string
          description: Article headline.
          example: Sensex jumps 700 points
        seenDate:
          type: string
          description: ISO timestamp when GDELT indexed this article.
          example: '2026-03-27T07:00:00Z'
        socialImage:
          type: string
          description: Social / og:image URL.
          example: https://...
        domain:
          type: string
          description: Source domain.
          example: reuters.com
        language:
          type: string
          description: Article language.
          example: English
        sourceCountry:
          type: string
          description: FIPS 2-letter country code of source.
          example: IN
      required:
        - url
        - title
        - seenDate
        - domain
        - language
        - sourceCountry
    PaginationMetaResponseDto:
      type: object
      properties:
        page:
          type: number
          example: 1
        limit:
          type: number
          example: 25
        total:
          type: number
          example: 120
        totalPages:
          type: number
          example: 5
        hasNextPage:
          type: boolean
          example: true
        hasPrevPage:
          type: boolean
          example: false
      required:
        - page
        - limit
        - total
        - totalPages
        - hasNextPage
        - hasPrevPage
    UserNewsResponseDto:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: '#/components/schemas/NewsArticleResponseDto'
        pagination:
          $ref: '#/components/schemas/PaginationMetaResponseDto'
        gdeltQueryUrl:
          type: string
          description: The resolved GDELT query URL (useful for debugging).
          example: https://api.gdeltproject.org/api/v2/doc/doc?query=...
      required:
        - articles
        - pagination
        - gdeltQueryUrl
